# CI unificado Paper 1.21.1 + Java 21 — sustituye los workflows "Gate 1…5" dispersos.
# Un solo nombre en la pestaña Actions evita ruido; cada job sigue siendo un bloque claro en el grafo.
#
# Branch protection: si tenias checks obligatorios con nombres "Gate 1: Foundation / …",
# sustituirlos por los checks de ESTE workflow (titulo "CI Monorepo 1.21" + nombre de cada job).
# El historial de ejecuciones viejas no se puede borrar desde git; en GitHub: Actions -> workflow antiguo -> "…" -> delete (por workflow) o dejar archivado.

name: CI Monorepo 1.21

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/**"
      - ".gitignore"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/**"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  foundation:
    name: Maven · fundación
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Empaquetar stack base (Dough + Slimefun + libs internas)
        run: |
          mvn -B clean package -DskipTests \
            -pl sources/dough-core,sources/slimefun-core/Slimefun4-src,sources/batch-2-expansion/SefiLib,sources/batch-2-expansion/InfinityLib,sources/internal-metadata/patches/commons-lang-drake-patched \
            -am
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verificar API Dough expuesta por Slimefun
        run: |
          JAR="$(find sources/slimefun-core/Slimefun4-src/target -maxdepth 1 -type f -name 'Slimefun-*.jar' ! -name 'original-*' ! -name '*-sources.jar' | head -n 1)"
          test -n "$JAR"
          jar tf "$JAR" | grep -q '^dev/drake/dough/collections/Pair.class$'
          jar tf "$JAR" | grep -q '^dev/drake/dough/items/CustomItemStack.class$'
          jar tf "$JAR" | grep -q '^dev/drake/dough/data/persistent/PersistentDataAPI.class$'
          jar tf "$JAR" | grep -q '^dev/drake/dough/protection/Interaction.class$'

      - name: Verificar que las librerias internas no dupliquen Dough
        run: |
          for DIR in sources/batch-2-expansion/SefiLib sources/batch-2-expansion/InfinityLib; do
            JAR="$(find "$DIR/target" -maxdepth 1 -type f -name '*.jar' ! -name 'original-*' ! -name '*-sources.jar' | head -n 1)"
            test -n "$JAR"
            ! jar tf "$JAR" | grep -q '^dev/drake/dough/'
          done

  maven_full_reactor:
    name: Maven · reactor completo
    needs: [foundation]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Set up Gradle (SlimefunTranslation JAR para UltimateGenerators2)
        uses: gradle/actions/setup-gradle@v6

      # SlimefunTranslation usa mavenLocal(); este runner no hereda el .m2 del job fundación.
      - name: Publicar API Slimefun/Dough en .m2 (antes del Gradle aislado de SlimefunTranslation)
        run: |
          mvn -B clean install -DskipTests \
            -pl sources/dough-core,sources/slimefun-core/Slimefun4-src,sources/batch-2-expansion/SefiLib,sources/batch-2-expansion/InfinityLib,sources/repos-to-port/InfinityExpansion \
            -am
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SlimefunTranslation shadowJar (API Drake en classpath de UG2)
        run: |
          cd sources/community-addons/SlimefunTranslation
          chmod +x ./gradlew
          ./gradlew --no-daemon shadowJar

      - name: Empaquetar los 81 módulos Maven del reactor
        run: |
          mvn -B package -Dmaven.test.skip=true -fae
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verificar que los addons no empaqueten API Dough duplicada
        run: |
          while IFS= read -r JAR; do
            if jar tf "$JAR" | grep -q '^dev/drake/dough/'; then
              echo "::error file=$JAR::El addon incluye API Dough; debe usar la copia provista por Slimefun."
              exit 1
            fi
          done < <(find sources -path '*/target/*.jar' -type f ! -name 'original-*' ! -name '*-sources.jar' ! -path 'sources/dough-core/*' ! -path 'sources/slimefun-core/*')

      - name: Recolectar JARs del monorepo
        if: github.event_name != 'pull_request'
        run: python scripts/release/collect_monorepo_jars.py --out dist/ci-monorepo-jars

      - name: Subir artifacts JAR del monorepo
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: monorepo-jars-${{ github.sha }}
          path: dist/ci-monorepo-jars/

  gradle_green:
    name: Gradle · reactor completo
    needs: [foundation]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Publicar artefactos Maven para el reactor Gradle
        run: |
          mvn -B clean install -DskipTests \
            -pl sources/dough-core,sources/slimefun-core/Slimefun4-src,sources/batch-2-expansion/SefiLib,sources/batch-2-expansion/InfinityLib,sources/repos-to-port/InfinityExpansion \
            -am
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Empaquetar los 5 proyectos Gradle del reactor
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon \
            :sources:community-addons:SlimefunTranslation:shadowJar \
            :sources:community-addons:Bump:shadowJar \
            :sources:batch-2-expansion:Galactifun:shadowJar \
            :sources:community-addons:CustomItemGenerators:shadowJar \
            :sources:community-addons:FastMachines:shadowJar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verificar que los JARs Gradle no empaqueten API Dough duplicada
        run: |
          while IFS= read -r JAR; do
            if jar tf "$JAR" | grep -q '^dev/drake/dough/'; then
              echo "::error file=$JAR::El addon Gradle incluye API Dough; debe usar la copia provista por Slimefun."
              exit 1
            fi
          done < <(find sources -path '*/build/libs/*.jar' -type f ! -name '*-sources.jar')

      # Galactifun2: proyecto Gradle aparte (Kotlin + buildSrc); no forma parte del composite raíz.
      - name: Galactifun2 (Gradle aislado, compileKotlin)
        run: |
          cd sources/repos-to-port/Galactifun2
          chmod +x ./gradlew
          ./gradlew --no-daemon :plugin:compileKotlin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job ligero para branch protection: marcar un solo check "CI Monorepo 1.21 / ci_summary".
  # Solo se ejecuta si todos los needs tuvieron éxito (comportamiento por defecto de GitHub).
  ci_summary:
    name: CI — resumen
    needs: [foundation, maven_full_reactor, gradle_green]
    runs-on: ubuntu-latest
    steps:
      - run: echo "CI Monorepo 1.21 — todos los jobs obligatorios OK."
