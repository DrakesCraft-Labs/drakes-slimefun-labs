name: Drake Close invalid Issue

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  comment:

    name: Invalid Issues
    runs-on: ubuntu-latest

    if: contains(github.event.issue.labels.*.name, '🐞 Bug Report') == false && contains(github.event.issue.labels.*.name, 'Hacktoberfest') == false
    steps:
    - name: Close Issue
      uses: maxkomarychev/octions/octions/issues/update@master
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        issue_number: ${{ github.event.issue.number }}
        state: closed
    - name: Add invalid label
      uses: maxkomarychev/octions/octions/issues/add-labels@master
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        issue_number: ${{ github.event.issue.number }}
        labels: 'invalid'
    - name: Create a comment
      uses: maxkomarychev/octions/octions/issues/create-comment@master
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        issue_number: ${{ github.event.issue.number }}
        body: |-
           Your issue seems to be missing our template.
           [Click here to create a bug report](https://github.com/DrakesCraft-Labs/drakes-slimefun-labs/issues/new/choose)

           Please remember that this Bug Tracker is exclusively reserved for Bug reports.
