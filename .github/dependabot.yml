# Dependabot: pocos PRs, revisables, alineados al monorepo Paper 1.21 + Java 21.
# Política: majors de producción y bumps de API Paper → a mano (PR dedicado + CI + smoke).
# Ver también: docs/github-maintenance.md

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 1
    groups:
      actions-all:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "tuesday"
    # Un solo PR Maven abierto (prod O dev); evita pares #23+#24 y fuerza revisar en serie.
    open-pull-requests-limit: 1
    groups:
      # Solo patch/minor: los majors rompen transitivos (p. ej. Guava, Jackson) y el reactor 81 módulos.
      maven-production:
        dependency-type: "production"
        update-types:
          - "patch"
          - "minor"
      maven-development:
        dependency-type: "development"
        update-types:
          - "patch"
          - "minor"
          - "major"
    labels:
      - "dependencies"
      - "java"
      - "maven"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Artifacts internos publicados en GitHub Packages: se suben desde el
      # monorepo y Dependabot no debe intentar resolverlos sin credenciales.
      - dependency-name: "com.github.drakescraft_labs:*"
      # API alineada con paper.version + smoke; subir solo en PR humano.
      - dependency-name: "io.papermc.paper:paper-api"
      - dependency-name: "net.md-5:bungeecord-chat"
      # Spring 7.x → Jakarta 9+ / plataforma distinta.
      - dependency-name: "org.springframework:spring-context"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.springframework:spring-beans"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.springframework:spring-core"
        update-types: ["version-update:semver-major"]
