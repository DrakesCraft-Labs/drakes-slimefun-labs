name: Coronalis
version: ${project.version}
main: com.github.jackstar.coronalis.Coronalis
api-version: '1.21'
description: Addon Slimefun Coronalis — array de radio, correlación de fase y catálogo de descubrimientos con XP.
depend:
  - Slimefun
author: JackStar6677-1
website: https://github.com/JackStar6677-1/Coronalis
commands:
  coronalis:
    description: Terminal de acceso Coronalis.
    usage: /coronalis auth
    aliases: [cor]
permissions:
  coronalis.admin:
    description: Permite administrar cualquier consola Coronalis.
    default: op
