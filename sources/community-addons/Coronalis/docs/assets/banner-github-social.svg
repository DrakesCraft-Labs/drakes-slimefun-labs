    <circle class="pu" cx="0" cy="0" r="10" fill="none" stroke="#d4af37" stroke-width="1.5" style="animation-delay:1.2s"/>
  </g>
  <path class="wv" d="M400 480 C600 320,850 360,1200 460" fill="none" stroke="url(#svio)" stroke-width="2.5" opacity=".5"/>
  <g class="sh" transform="translate(700 180)">
    <path d="M0 12 L40 0 L46 10 L40 22 L0 12Z" fill="#1a142c" stroke="#e879f9" stroke-width="1.2"/>
    <circle cx="44" cy="11" r="3" fill="#4ade80"/>
  </g>
  <g class="sh" transform="translate(980 420) scale(-1,1)">
    <path d="M0 10 L36 2 L42 10 L36 18 L0 10Z" fill="#1a142c" stroke="url(#sgold)" stroke-width="1"/>
  </g>
  <g transform="translate(1020 280) scale(1.1)">
