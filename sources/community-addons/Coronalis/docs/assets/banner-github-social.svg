  </g>
  <text x="72" y="100" font-family="Segoe UI,Arial" font-size="22" font-weight="700" fill="#e879f9" letter-spacing="6">CORONALIS</text>
  <text x="68" y="200" font-family="Segoe UI,Arial" font-size="88" font-weight="800" fill="url(#sgold)">Coronalis</text>
  <text x="72" y="260" font-family="Segoe UI,Arial" font-size="32" fill="#e2e8f0">Addon Slimefun &#183; radioastronomía &#183; XP</text>
  <text x="72" y="320" font-family="Segoe UI,Arial" font-size="24" fill="#94a3b8">Radar &#183; correlación de fase &#183; cielo profundo</text>
