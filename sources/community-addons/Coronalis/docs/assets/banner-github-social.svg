  </g>
  <circle cx="220" cy="340" r="155" fill="rgba(74,222,128,.08)" stroke="rgba(74,222,128,.35)" stroke-width="2"/>
  <circle cx="220" cy="340" r="110" fill="none" stroke="rgba(74,222,128,.2)"/>
  <circle cx="220" cy="340" r="60" fill="none" stroke="rgba(74,222,128,.15)"/>
  <g clip-path="url(#sclip)"><path class="sw" d="M220 340 L220 190 A150 150 0 0 1 370 340 Z" fill="url(#svio)" opacity=".4"/></g>
  <circle cx="280" cy="290" r="5" fill="#4ade80" class="st"/>
  <circle cx="170" cy="380" r="4" fill="#e879f9" class="st"/>
  <g transform="translate(420 340)">
