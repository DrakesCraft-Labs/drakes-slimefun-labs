<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Coronalis social preview">
  <defs>
    <radialGradient id="sbg" cx="50%" cy="40%" r="90%">
      <stop offset="0%" stop-color="#2a1848"/>
      <stop offset="55%" stop-color="#120a24"/>
      <stop offset="100%" stop-color="#05030d"/>
    </radialGradient>
    <linearGradient id="sgold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6e7a8"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    <linearGradient id="svio" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <clipPath id="sclip"><circle cx="220" cy="340" r="150"/></clipPath>
    <style>
      .st{animation:tw 3s ease-in-out infinite}
      .sw{animation:sr 4s linear infinite;transform-origin:220px 340px}
      .pu{animation:pu 3s ease-out infinite}
      .wv{stroke-dasharray:8 12;animation:ds 7s linear infinite}
      .sh{animation:dr 20s linear infinite}
      @keyframes tw{0%,100%{opacity:.4}50%{opacity:1}}
      @keyframes sr{to{transform:rotate(360deg)}}
      @keyframes pu{0%{r:10;opacity:.7}100%{r:200;opacity:0}}
      @keyframes ds{to{stroke-dashoffset:-40}}
      @keyframes dr{0%{transform:translateX(0)}100%{transform:translateX(60px)}}
    </style>
  </defs>
  <rect width="1280" height="640" fill="url(#sbg)"/>
  <g fill="#fff" opacity=".65">
